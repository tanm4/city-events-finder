<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">⚡</div>
    <div class="nav">
      <div class="nav-item active">🏠</div>
      <div class="nav-item">📁</div>
      <div class="nav-item">📅</div>
      <div class="nav-item">🗑️</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Top Bar -->
    <div class="topbar">
      <input id="cityInput" placeholder="Search city (e.g. Richmond)" />
      <button onclick="searchEvents()">Search</button>
      <img class="avatar" src="https://i.pravatar.cc/40"/>
    </div>

    <h2>Ongoing Events</h2>

    <div id="results" class="cards"></div>

  </main>

  <!-- Right Panel -->
  <aside class="right">
    <h3>Live Status</h3>
    <p>Connected to API</p>

    <h3>Stats</h3>
    <div class="stats">
      <div class="stat purple">70%</div>
      <div class="stat orange">58%</div>
      <div class="stat green">35%</div>
    </div>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>
